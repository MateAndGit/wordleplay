<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="play__container">
      <div id="wordle__container" class="wordle__container"></div>
      <div id="keyboard__container" class="keyboard__container"></div>
      <div class="how__to__play">
        <div class="correct__color">
          <p>Correct color :</p>
          <div class="green"></div>
        </div>
        <div class="present__color">
          <p>Present color :</p>
          <div class="yellow"></div>
        </div>
        <div class="absent__color">
          <p>Absent color :</p>
          <div class="gray"></div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
